<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>Spike AI — Explainer Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #07111A; overflow: hidden; font-family: 'Heebo', sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#07111A"/>
  <circle cx="100" cy="100" r="60" fill="#22D3B0" opacity="0.2"/>
  <circle cx="100" cy="100" r="40" fill="#22D3B0"/>
  <circle cx="88" cy="92" r="6" fill="#0a1f2c"/>
  <circle cx="112" cy="92" r="6" fill="#0a1f2c"/>
  <path d="M 88 110 Q 100 120 112 110" stroke="#0a1f2c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="100" y2="48" stroke="#5EEAD4" stroke-width="2"/>
  <circle cx="100" cy="44" r="3" fill="#5EEAD4"/>
  <polygon points="100,135 95,150 105,150" fill="#fff"/>
  <text x="100" y="180" text-anchor="middle" fill="#5EEAD4" font-size="14" font-family="sans-serif" font-weight="700">Spike</text>
</svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../animations.jsx"></script>
<script type="text/babel" src="spike.jsx"></script>
<script type="text/babel" src="scenes-1-2.jsx"></script>
<script type="text/babel" src="scene-3.jsx"></script>
<script type="text/babel" src="scenes-4-5.jsx"></script>

<script type="text/babel">
const TOTAL = 60;

// Subtitle data — synced to scene timing
const SUBTITLES = [
  { start: 0,  end: 8,  text: "באמצע הלילה, העסק שלך עדיין מקבל לידים. ביקורות. שאלות. ובבוקר, אתה כבר מאחר." },
  { start: 9,  end: 20, text: "תכיר את הצוות שלך. סוכני AI שעובדים בזמן שאתה ישן. כל אחד מתמחה במשהו אחר — וכולם עובדים יחד." },
  { start: 21, end: 26, text: "סוכן הבוקר סוקר לך את הלילה." },
  { start: 26, end: 31, text: "סוכן הביקורות תופס מה שדורש תגובה." },
  { start: 31, end: 36, text: "סוכן הלידים מדרג את החמים." },
  { start: 36, end: 41, text: "סוכן המנהל אומר לך מה לתקן. וזו רק התחלה." },
  { start: 41, end: 50, text: "ב-7 בבוקר, אתה לא מתחיל את היום עם בלגן. אתה מתחיל אותו עם תוכנית." },
  { start: 51, end: 60, text: "Spike AI Agents. צוות שעובד בשבילך — 24/7. קבל היום הצעה אישית." },
];

// Subtitle bar — overlays on top of stage canvas
const SubtitleBar = () => {
  const t = useTime();
  const sub = SUBTITLES.find(s => t >= s.start && t < s.end);
  // Fade in/out
  let op = 0;
  if (sub) {
    const fade = 0.3;
    if (t - sub.start < fade) op = (t - sub.start) / fade;
    else if (sub.end - t < fade) op = (sub.end - t) / fade;
    else op = 1;
  }

  // Scene marker
  const fmt = (s) => {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${String(sec).padStart(2, '0')}`;
  };

  return (
    <div style={{
      position: 'absolute',
      bottom: 40, left: 60, right: 60,
      minHeight: 100,
      background: 'rgba(7,17,26,0.85)',
      backdropFilter: 'blur(10px)',
      WebkitBackdropFilter: 'blur(10px)',
      borderTop: '2px solid rgba(34,211,176,0.4)',
      borderRadius: 12,
      padding: '14px 32px',
      direction: 'rtl',
      textAlign: 'center',
      opacity: op,
      transition: 'opacity 0.2s ease',
      pointerEvents: 'none',
    }}>
      {sub && (
        <>
          <div style={{
            fontSize: 14,
            color: '#5EEAD4',
            opacity: 0.6,
            letterSpacing: '0.05em',
            marginBottom: 8,
            fontFamily: 'Heebo, monospace',
            direction: 'ltr',
          }}>
            [{fmt(sub.start)} – {fmt(sub.end)}]
          </div>
          <div style={{
            fontSize: 28,
            color: '#fff',
            fontWeight: 500,
            fontFamily: 'Heebo, sans-serif',
            lineHeight: 1.4,
          }}>
            {sub.text}
          </div>
        </>
      )}
    </div>
  );
};

// Scene title overlay (top-right marker)
const SceneMarker = () => {
  const t = useTime();
  const scenes = [
    { start: 0,  end: 8,  num: 1, name: "Hook" },
    { start: 9,  end: 20, num: 2, name: "Meet the Team" },
    { start: 21, end: 40, num: 3, name: "Demo" },
    { start: 41, end: 50, num: 4, name: "Result" },
    { start: 51, end: 60, num: 5, name: "CTA" },
  ];
  const cur = scenes.find(s => t >= s.start && t <= s.end);
  if (!cur) return null;
  return (
    <div style={{
      position: 'absolute', top: 30, left: 30,
      padding: '10px 18px',
      background: 'rgba(7,17,26,0.6)',
      border: '1px solid rgba(34,211,176,0.3)',
      borderRadius: 999,
      color: '#5EEAD4',
      fontSize: 14,
      fontWeight: 600,
      letterSpacing: '0.1em',
      fontFamily: 'Heebo, sans-serif',
      pointerEvents: 'none',
      direction: 'ltr',
    }}>
      Scene {cur.num} · {cur.name}
    </div>
  );
};

// SVG defs (gradients, filters) — shared across all scenes
const Defs = () => (
  <defs>
    <radialGradient id="auraGrad">
      <stop offset="0%" stopColor="#5EEAD4" stopOpacity="0.5" />
      <stop offset="60%" stopColor="#22D3B0" stopOpacity="0.2" />
      <stop offset="100%" stopColor="#22D3B0" stopOpacity="0" />
    </radialGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#22D3B0" />
      <stop offset="100%" stopColor="#5BD0F2" />
    </linearGradient>
    <linearGradient id="sunriseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#FCD34D" />
      <stop offset="100%" stopColor="#22D3B0" />
    </linearGradient>
    <linearGradient id="quadFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#22D3B0" stopOpacity="0.05" />
      <stop offset="100%" stopColor="#07111A" stopOpacity="0" />
    </linearGradient>
    <filter id="blur40" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="blur8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="blur4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>
);

// Master scene router
const Movie = () => {
  const t = useTime();
  return (
    <>
      {/* Background — always dark */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(circle at 50% 50%, #0a1620 0%, #07111A 60%, #050a10 100%)',
      }} />

      {/* Single SVG layer for all scenes */}
      <svg viewBox="0 0 1920 1080" width="1920" height="1080"
        style={{ position: 'absolute', inset: 0, display: 'block' }}>
        <Defs />

        <Sprite start={0} end={8.5}><Scene1Hook /></Sprite>
        <Sprite start={8} end={9}><Transition1 /></Sprite>
        <Sprite start={8.8} end={20.5}><Scene2Team /></Sprite>
        <Sprite start={20.5} end={40.5}><Scene3Demo /></Sprite>
        <Sprite start={40.5} end={50.5}><Scene4Result /></Sprite>
        <Sprite start={50.5} end={60}><Scene5CTA /></Sprite>
      </svg>

      <SceneMarker />
      <SubtitleBar />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage width={1920} height={1080} duration={TOTAL} background="#07111A" persistKey="spike-explainer">
    <Movie />
  </Stage>
);
</script>
</body>
</html>
